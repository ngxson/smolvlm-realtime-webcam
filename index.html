<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Interaction App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', monospace;
            background-color: #fafafa;
            color: #2d2d2d;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 2rem;
            text-align: center;
            color: #1a1a1a;
            letter-spacing: -0.02em;
        }

        .video-container {
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
        }

        #videoFeed {
            width: 640px;
            height: 480px;
            border: 3px solid #2d2d2d;
            background-color: #000;
            display: block;
        }

        .io-section {
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #2d2d2d;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #2d2d2d;
            background-color: #fff;
            color: #2d2d2d;
            font-family: inherit;
            font-size: 0.875rem;
            line-height: 1.4;
            resize: vertical;
            transition: border-color 0.2s ease;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #000;
        }

        textarea {
            min-height: 3rem;
            max-height: 8rem;
        }

        textarea[readonly] {
            background-color: #f5f5f5;
            color: #666;
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
            margin-bottom: 2rem;
        }

        .control-group {
            flex: 1;
        }

        #startButton {
            padding: 0.75rem 1.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: 2px solid #2d2d2d;
            background-color: #2d2d2d;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 120px;
        }

        #startButton:hover {
            background-color: #1a1a1a;
            border-color: #1a1a1a;
        }

        #startButton:active {
            transform: translateY(1px);
        }

        #startButton.stop {
            background-color: #fff;
            color: #2d2d2d;
        }

        #startButton.stop:hover {
            background-color: #fafafa;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            #videoFeed {
                width: 100%;
                max-width: 480px;
                height: 360px;
            }
            
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            #startButton {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Camera Interaction App</h1>

        <div class="video-container">
            <video id="videoFeed" autoplay playsinline></video>
        </div>
        <canvas id="canvas" class="hidden"></canvas>

        <div class="io-section">
            <div class="input-group">
                <label for="baseURL">Base API</label>
                <input type="text" id="baseURL" value="http://localhost:8080" />
            </div>
            <div class="input-group">
                <label for="instructionText">Instruction</label>
                <textarea id="instructionText" placeholder="e.g., 'What do you see?' or 'Count the objects' or 'What color is this?'"></textarea>
            </div>
            <div class="input-group">
                <label for="responseText">Response</label>
                <textarea id="responseText" readonly placeholder="Server response will appear here..."></textarea>
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="intervalSelect">Interval</label>
                <select id="intervalSelect">
                    <option value="100">100ms</option>
                    <option value="250">250ms</option>
                    <option value="500" selected>500ms</option>
                    <option value="1000">1s</option>
                    <option value="2000">2s</option>
                    <option value="5000">5s</option>
                </select>
            </div>
            <button id="startButton" class="start">Start</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('videoFeed');
        const canvas = document.getElementById('canvas');
        const baseURL = document.getElementById('baseURL');
        const instructionText = document.getElementById('instructionText');
        const responseText = document.getElementById('responseText');
        const intervalSelect = document.getElementById('intervalSelect');
        const startButton = document.getElementById('startButton');

        instructionText.value = "What do you see?"; // Simple, direct default instruction

        let stream;
        let intervalId;
        let isProcessing = false;

        // Function to simplify and make responses more direct
        function simplifyResponse(response) {
            // Remove unnecessary filler words and make it concise
            let simplified = response
                .replace(/^(I can see|I see|I notice|I observe|It appears|It looks like|There is|There are)\s*/i, '')
                .replace(/\s+(that|which|who)\s+is\s+/gi, ' is ')
                .replace(/\s+and\s+it\s+(looks|appears|seems)\s+/gi, ' ')
                .replace(/\s*\.*\s*in\s+the\s+image\s*/gi, '')
                .replace(/\s*\.*\s*in\s+this\s+photo\s*/gi, '')
                .replace(/\s*\.*\s*in\s+the\s+photo\s*/gi, '')
                .replace(/\s*\.*\s*in\s+the\s+picture\s*/gi, '')
                .trim();
            
            // Capitalize first letter
            simplified = simplified.charAt(0).toUpperCase() + simplified.slice(1);
            
            // Remove trailing periods for very short responses
            if (simplified.length < 50 && simplified.endsWith('.')) {
                simplified = simplified.slice(0, -1);
            }
            
            return simplified;
        }

        // Returns response text (string)
        async function sendChatCompletionRequest(instruction, imageBase64URL) {
            const response = await fetch(`${baseURL.value}/v1/chat/completions`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    max_tokens: 50, // Reduced from 100 for more concise responses
                    messages: [
                        { role: 'system', content: 'You are a direct and concise visual assistant. Provide brief, factual answers without filler words or unnecessary explanations. Be specific and to the point.' },
                        { role: 'user', content: [
                            { type: 'text', text: instruction },
                            { type: 'image_url', image_url: {
                                url: imageBase64URL,
                            } }
                        ] },
                    ]
                })
            });
            if (!response.ok) {
                const errorData = await response.text();
                return `Server error: ${response.status} - ${errorData}`;
            }
            const data = await response.json();
            const rawResponse = data.choices[0].message.content;
            return simplifyResponse(rawResponse);
        }

        // 1. Ask for camera permission on load
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = stream;
                responseText.value = "Camera access granted. Ready to start.";
            } catch (err) {
                console.error("Error accessing camera:", err);
                responseText.value = `Error accessing camera: ${err.name} - ${err.message}. Please ensure permissions are granted and you are on HTTPS or localhost.`;
                alert(`Error accessing camera: ${err.name}. Make sure you've granted permission and are on HTTPS or localhost.`);
            }
        }

        function captureImage() {
            if (!stream || !video.videoWidth) {
                console.warn("Video stream not ready for capture.");
                return null;
            }
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            return canvas.toDataURL('image/jpeg', 0.8); // Use JPEG for smaller size, 0.8 quality
        }

        async function sendData() {
            if (!isProcessing) return; // Ensure we don't have overlapping requests if processing takes longer than interval

            const instruction = instructionText.value;
            const imageBase64URL = captureImage();

            if (!imageBase64URL) {
                responseText.value = "Failed to capture image. Stream might not be active.";
                // Optionally stop processing if image capture fails consistently
                // handleStop();
                return;
            }

            const payload = {
                instruction: instruction,
                imageBase64URL: imageBase64URL
            };

            try {
                const response = await sendChatCompletionRequest(payload.instruction, payload.imageBase64URL);
                responseText.value = response;
            } catch (error) {
                console.error('Error sending data:', error);
                responseText.value = `Error: ${error.message}`;
            }
        }

        function handleStart() {
            if (!stream) {
                responseText.value = "Camera not available. Cannot start.";
                alert("Camera not available. Please grant permission first.");
                return;
            }
            isProcessing = true;
            startButton.textContent = "Stop";
            startButton.classList.remove('start');
            startButton.classList.add('stop');

            instructionText.disabled = true;
            intervalSelect.disabled = true;

            responseText.value = "Processing started...";

            const intervalMs = parseInt(intervalSelect.value, 10);
            
            // Initial immediate call
            sendData(); 
            
            // Then set interval
            intervalId = setInterval(sendData, intervalMs);
        }

        function handleStop() {
            isProcessing = false;
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }
            startButton.textContent = "Start";
            startButton.classList.remove('stop');
            startButton.classList.add('start');

            instructionText.disabled = false;
            intervalSelect.disabled = false;
            if (responseText.value.startsWith("Processing started...")) {
                responseText.value = "Processing stopped.";
            }
        }

        startButton.addEventListener('click', () => {
            if (isProcessing) {
                handleStop();
            } else {
                handleStart();
            }
        });

        // Initialize camera when the page loads
        window.addEventListener('DOMContentLoaded', initCamera);

        // Optional: Stop stream when page is closed/navigated away to release camera
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            if (intervalId) {
                clearInterval(intervalId);
            }
        });

    </script>
</body>
</html>
